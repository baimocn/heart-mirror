<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日微行动 - 心镜</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .tasks-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .task-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }
        .task-card:hover {
            transform: translateY(-5px);
        }
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .task-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        .task-category {
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
        }
        .task-category.empathy { background: #E3F2FD; color: #1976D2; }
        .task-category.altruism { background: #E8F5E8; color: #388E3C; }
        .task-category.rule { background: #FFF3E0; color: #F57C00; }
        .task-category.justice { background: #F3E5F5; color: #7B1FA2; }
        .task-category.utilitarian { background: #E0F7FA; color: #0097A7; }
        .task-category.punish { background: #FFEBEE; color: #D32F2F; }
        .task-description {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .task-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .task-meta {
            display: flex;
            gap: 15px;
        }
        .task-difficulty {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #666;
            font-size: 14px;
        }
        .task-points {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #FF9800;
            font-weight: 500;
            font-size: 14px;
        }
        .task-actions {
            display: flex;
            gap: 10px;
        }
        .btn-assign, .btn-complete {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-assign {
            background: #4CAF50;
            color: white;
        }
        .btn-assign:hover {
            background: #45a049;
        }
        .btn-complete {
            background: #2196F3;
            color: white;
        }
        .btn-complete:hover {
            background: #0b7dda;
        }
        .points-container {
            background: #FFF3CD;
            border: 1px solid #FFEEBA;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .points-label {
            font-size: 16px;
            font-weight: 500;
            color: #856404;
        }
        .points-value {
            font-size: 24px;
            font-weight: bold;
            color: #856404;
        }
        .section-title {
            font-size: 20px;
            font-weight: bold;
            margin: 30px 0 15px;
            color: #333;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        .empty-state i {
            font-size: 48px;
            margin-bottom: 15px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <i class="fas fa-mirror"></i>
                <h1>心镜</h1>
            </div>
            <nav>
                <a href="/" class="nav-link">首页</a>
                <a href="/dilemmas" class="nav-link">道德困惑墙</a>
                <a href="/tasks" class="nav-link active">每日微行动</a>
                <a href="/messages" class="nav-link">善行回音壁</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="tasks-container">
            <h2>每日微行动</h2>
            <p class="subtitle">根据你的人格特质，我们为你推荐了一些小任务，完成后可以积累积分。</p>
            
            <!-- 积分显示 -->
            <div class="points-container">
                <div class="points-label">当前积分</div>
                <div class="points-value" id="userPoints">0</div>
            </div>
            
            <!-- 推荐任务 -->
            <h3 class="section-title">推荐任务</h3>
            <div id="recommendedTasks"></div>
            
            <!-- 我的任务 -->
            <h3 class="section-title">我的任务</h3>
            <div id="myTasks"></div>
            
            <!-- 已完成任务 -->
            <h3 class="section-title">已完成任务</h3>
            <div id="completedTasks"></div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>© 2024 心镜 · 道德人格测试</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-weixin"></i></a>
                <a href="#"><i class="fab fa-weibo"></i></a>
                <a href="#"><i class="fab fa-qq"></i></a>
            </div>
        </div>
    </footer>

    <script>
        // 生成或获取设备ID
        function getDeviceId() {
            let deviceId = localStorage.getItem('device_id');
            if (!deviceId) {
                deviceId = 'device_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('device_id', deviceId);
            }
            return deviceId;
        }
        
        const deviceId = getDeviceId();
        
        // 加载用户积分
        async function loadUserPoints() {
            try {
                const response = await fetch(`/api/user_points?device_id=${deviceId}`);
                const data = await response.json();
                document.getElementById('userPoints').textContent = data.points || 0;
            } catch (error) {
                console.error('加载积分失败:', error);
            }
        }
        
        // 加载推荐任务
        async function loadRecommendedTasks() {
            try {
                const response = await fetch('/api/tasks');
                const tasks = await response.json();
                const container = document.getElementById('recommendedTasks');
                
                if (tasks.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-tasks"></i>
                            <p>暂无推荐任务</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = tasks.map(task => `
                    <div class="task-card">
                        <div class="task-header">
                            <div class="task-title">${task.title}</div>
                            <div class="task-category ${task.category}">${getCategoryName(task.category)}</div>
                        </div>
                        <div class="task-description">${task.description}</div>
                        <div class="task-footer">
                            <div class="task-meta">
                                <div class="task-difficulty">
                                    <i class="fas fa-star"></i>
                                    <span>难度: ${task.difficulty}</span>
                                </div>
                                <div class="task-points">
                                    <i class="fas fa-coins"></i>
                                    <span>${task.points} 积分</span>
                                </div>
                            </div>
                            <div class="task-actions">
                                <button class="btn-assign" onclick="assignTask(${task.id})">
                                    <i class="fas fa-plus"></i> 接受任务
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载推荐任务失败:', error);
            }
        }
        
        // 加载我的任务
        async function loadMyTasks() {
            try {
                const response = await fetch(`/api/user_tasks?device_id=${deviceId}&status=pending`);
                const tasks = await response.json();
                const container = document.getElementById('myTasks');
                
                if (tasks.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-clipboard-list"></i>
                            <p>你还没有接受任何任务</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = tasks.map(task => `
                    <div class="task-card">
                        <div class="task-header">
                            <div class="task-title">${task.task.title}</div>
                            <div class="task-category ${task.task.category}">${getCategoryName(task.task.category)}</div>
                        </div>
                        <div class="task-description">${task.task.description}</div>
                        <div class="task-footer">
                            <div class="task-meta">
                                <div class="task-difficulty">
                                    <i class="fas fa-star"></i>
                                    <span>难度: ${task.task.difficulty}</span>
                                </div>
                                <div class="task-points">
                                    <i class="fas fa-coins"></i>
                                    <span>${task.task.points} 积分</span>
                                </div>
                            </div>
                            <div class="task-actions">
                                <button class="btn-complete" onclick="completeTask(${task.id})">
                                    <i class="fas fa-check"></i> 完成任务
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载我的任务失败:', error);
            }
        }
        
        // 加载已完成任务
        async function loadCompletedTasks() {
            try {
                const response = await fetch(`/api/user_tasks?device_id=${deviceId}&status=completed`);
                const tasks = await response.json();
                const container = document.getElementById('completedTasks');
                
                if (tasks.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-check-circle"></i>
                            <p>你还没有完成任何任务</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = tasks.map(task => `
                    <div class="task-card">
                        <div class="task-header">
                            <div class="task-title">${task.task.title}</div>
                            <div class="task-category ${task.task.category}">${getCategoryName(task.task.category)}</div>
                        </div>
                        <div class="task-description">${task.task.description}</div>
                        <div class="task-footer">
                            <div class="task-meta">
                                <div class="task-difficulty">
                                    <i class="fas fa-star"></i>
                                    <span>难度: ${task.task.difficulty}</span>
                                </div>
                                <div class="task-points">
                                    <i class="fas fa-coins"></i>
                                    <span>${task.task.points} 积分</span>
                                </div>
                            </div>
                            <div class="task-actions">
                                <button class="btn-complete" disabled>
                                    <i class="fas fa-check-double"></i> 已完成
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载已完成任务失败:', error);
            }
        }
        
        // 分配任务
        async function assignTask(taskId) {
            try {
                const response = await fetch('/api/tasks/assign', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        device_id: deviceId,
                        task_id: taskId
                    })
                });
                
                const data = await response.json();
                if (data.message) {
                    alert(data.message);
                    loadMyTasks();
                }
            } catch (error) {
                console.error('分配任务失败:', error);
                alert('分配任务失败，请重试');
            }
        }
        
        // 完成任务
        async function completeTask(userTaskId) {
            try {
                const response = await fetch(`/api/user_tasks/${userTaskId}/complete`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                if (data.message) {
                    alert(data.message);
                    loadMyTasks();
                    loadCompletedTasks();
                    loadUserPoints();
                }
            } catch (error) {
                console.error('完成任务失败:', error);
                alert('完成任务失败，请重试');
            }
        }
        
        // 获取分类名称
        function getCategoryName(category) {
            const categoryMap = {
                'empathy': '共情力',
                'altruism': '利他主义',
                'rule': '规则遵从',
                'justice': '正义感',
                'utilitarian': '功利倾向',
                'punish': '惩罚欲'
            };
            return categoryMap[category] || category;
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadUserPoints();
            loadRecommendedTasks();
            loadMyTasks();
            loadCompletedTasks();
        });
    </script>
</body>
</html>
